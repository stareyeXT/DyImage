name: Android Production Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      ANDROID_NDK_VERSION: 29.0.14033849
      JAVA_VERSION: 17

    steps:
      # -------------------------------------------------
      # Checkout
      # -------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------------------------
      # Setup Java
      # -------------------------------------------------
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      # -------------------------------------------------
      # Setup Android SDK
      # -------------------------------------------------
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          packages: >-
            platform-tools build-tools;34.0.0 platforms;android-34
            ndk;${{ env.ANDROID_NDK_VERSION }}

      # -------------------------------------------------
      # Prepare Signing
      # -------------------------------------------------
      - name: Prepare signing files
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          required=(
            SIGNING_KEYSTORE_BASE64
            SIGNING_STORE_PASSWORD
            SIGNING_KEY_ALIAS
            SIGNING_KEY_PASSWORD
          )

          for s in "${required[@]}"; do
            if [ -z "${!s:-}" ]; then
              echo "❌ Missing secret: $s"
              exit 1
            fi
          done

          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > release.keystore

          cat > sign.properties <<EOF
          alias=$SIGNING_KEY_ALIAS
          keyPassword=$SIGNING_KEY_PASSWORD
          password=$SIGNING_STORE_PASSWORD
          file=$(pwd)/release.keystore
          EOF

      # -------------------------------------------------
      # Build
      # -------------------------------------------------
      - name: Build Release (AAB + APK)
        run: |
          set -euo pipefail
          chmod +x ./gradlew

          # AAB cannot be built together with multi-ABI APK splits.
          ./gradlew \
            :app:bundleRelease \
            -PenableAbiSplits=false \
            --no-daemon \
            --stacktrace

          ./gradlew \
            :app:assembleRelease \
            -PenableAbiSplits=true \
            --no-daemon \
            --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.ANDROID_NDK_VERSION }}

      # -------------------------------------------------
      # Collect Artifacts
      # -------------------------------------------------
      - name: Collect Artifacts
        id: artifacts
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          files=()

          for f in app/build/outputs/apk/release/**/*.apk; do
            [ -f "$f" ] && files+=("$f")
          done

          for f in app/build/outputs/bundle/release/*.aab; do
            [ -f "$f" ] && files+=("$f")
          done

          if [ ${#files[@]} -eq 0 ]; then
            echo "❌ No release artifacts found"
            exit 1
          fi

          echo "Generating SHA256 checksums..."
          for f in "${files[@]}"; do
            sha256sum "$f" > "$f.sha256"
            files+=("$f.sha256")
          done

          printf '%s\n' "${files[@]}"

          {
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # -------------------------------------------------
      # Generate Advanced Changelog
      # -------------------------------------------------
      - name: Generate Changelog
        id: changelog
        run: |
          set -euo pipefail

          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -A1 "^${CURRENT_TAG}$" | tail -n1 || true)

          if [ -z "$PREVIOUS_TAG" ]; then
            RANGE=""
          else
            RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
          fi

          COMMITS=$(git log ${RANGE:-} --pretty=format:"%s")

          BREAKING=$(echo "$COMMITS" | grep -i 'BREAKING CHANGE' || true)
          FEAT=$(echo "$COMMITS" | grep -i '^feat' || true)
          FIX=$(echo "$COMMITS" | grep -i '^fix' || true)
          PERF=$(echo "$COMMITS" | grep -i '^perf' || true)
          REFACTOR=$(echo "$COMMITS" | grep -i '^refactor' || true)
          DOCS=$(echo "$COMMITS" | grep -i '^docs' || true)
          OTHERS=$(echo "$COMMITS" | grep -viE '^(feat|fix|perf|refactor|docs)' || true)

          {
            echo "changelog<<EOF"
            echo "## 🚀 ${CURRENT_TAG}"
            echo ""

            if [ -n "$BREAKING" ]; then
              echo "### ⚠ Breaking Changes"
              echo "$BREAKING" | sed 's/^/- /'
              echo ""
            fi

            if [ -n "$FEAT" ]; then
              echo "### ✨ Features"
              echo "$FEAT" | sed 's/^/- /'
              echo ""
            fi

            if [ -n "$FIX" ]; then
              echo "### 🐛 Fixes"
              echo "$FIX" | sed 's/^/- /'
              echo ""
            fi

            if [ -n "$PERF" ]; then
              echo "### ⚡ Performance"
              echo "$PERF" | sed 's/^/- /'
              echo ""
            fi

            if [ -n "$REFACTOR" ]; then
              echo "### 🔧 Refactor"
              echo "$REFACTOR" | sed 's/^/- /'
              echo ""
            fi

            if [ -n "$DOCS" ]; then
              echo "### 📝 Documentation"
              echo "$DOCS" | sed 's/^/- /'
              echo ""
            fi

            if [ -n "$OTHERS" ]; then
              echo "### 📦 Others"
              echo "$OTHERS" | sed 's/^/- /'
              echo ""
            fi

            echo "---"
            echo "Full Diff:"
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}"
            else
              echo "Initial Release"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # -------------------------------------------------
      # Create GitHub Release
      # -------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: ${{ steps.artifacts.outputs.files }}

      # -------------------------------------------------
      # Upload logs if failed
      # -------------------------------------------------
      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
